<h1>FIDAS Particulate Matter Data (&mu;g/m<sup>3</sup>)</h1>

<ul>
    <li>PM1.0</li>
    <li>PM2.5</li>
    <li>PM10</li>
</ul>

[Flags: 0b - No data; 1b - Good Data; 2b - Bad Data; 3b - Suspect; 4b - Local Influence.]

<h2>CSV Files</h2>
<ul id="csv-file-list"></ul>

<h2>NetCDF Files</h2>
<ul id="netcdf-file-list"></ul>

<script>
const sources = [
    {
        path: "fidas/PM/csv",
        extensions: [".csv"],
        listId: "csv-file-list",
        title: "CSV"
    },
    {
        path: "fidas/PM/netcdf",
        extensions: [".nc", ".nc4", ".cdf"],
        listId: "netcdf-file-list",
        title: "NetCDF"
    }
];

/*
  IMPORTANT:
  No GitHub API used anymore.
  You maintain file lists manually here.
*/
const fileIndex = {
    "fidas/PM/csv": [
        // Add CSV filenames here
        // "example1.csv",
        // "example2.csv"
    ],
    "fidas/PM/netcdf": [
        // Add NetCDF filenames here
        // "example1.nc",
        // "example2.nc"
    ]
};

sources.forEach(source => {

    const list = document.getElementById(source.listId);
    const files = fileIndex[source.path] || [];

    const filtered = files
        .filter(file =>
            source.extensions.some(ext =>
                file.toLowerCase().endsWith(ext)
            )
        )
        .sort();

    if (filtered.length === 0) {
        const li = document.createElement("li");
        li.textContent = `No ${source.title} files found`;
        list.appendChild(li);
        return;
    }

    filtered.forEach(file => {

        const li = document.createElement("li");
        const a = document.createElement("a");

        const rawUrl =
            `https://raw.githubusercontent.com/dcsbeddows/baqs_data/main/${source.path}/${file}`;

        a.href = "#";
        a.textContent = file;

        a.addEventListener("click", async (e) => {
            e.preventDefault();

            try {
                const response = await fetch(rawUrl);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);

                const downloadLink = document.createElement("a");
                downloadLink.href = blobUrl;
                downloadLink.download = file;

                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);

                URL.revokeObjectURL(blobUrl);

            } catch (error) {
                console.error(`Download failed for ${file}:`, error);
                alert(`Unable to download ${file}`);
            }
        });

        li.appendChild(a);
        list.appendChild(li);
    });
});
</script>
