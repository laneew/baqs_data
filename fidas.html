```html
<h2>CSV Files</h2>
<ul id="csv-file-list"></ul>

<h2>NetCDF Files</h2>
<ul id="netcdf-file-list"></ul>

<script>
const owner = "dcsbeddows";
const repo = "baqs_data";

const sources = [
    {
        path: "fidas/PM/csv",
        extensions: [".csv"],
        listId: "csv-file-list",
        title: "CSV"
    },
    {
        path: "fidas/PM/netcdf",
        extensions: [".nc", ".nc4", ".cdf"],
        listId: "netcdf-file-list",
        title: "NetCDF"
    }
];

sources.forEach(source => {

    fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${source.path}`)
        .then(response => {
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            return response.json();
        })
        .then(files => {

            const list = document.getElementById(source.listId);

            files
                .filter(file =>
                    source.extensions.some(ext =>
                        file.name.toLowerCase().endsWith(ext)
                    )
                )
                .sort((a, b) => a.name.localeCompare(b.name))
                .forEach(file => {

                    const li = document.createElement("li");
                    const a = document.createElement("a");

                    const rawUrl =
                        `https://raw.githubusercontent.com/${owner}/${repo}/main/${source.path}/${file.name}`;

                    a.href = rawUrl;
                    a.download = file.name;
                    a.textContent = file.name;

                    li.appendChild(a);
                    list.appendChild(li);
                });

            if (list.children.length === 0) {
                const li = document.createElement("li");
                li.textContent = `No ${source.title} files found`;
                list.appendChild(li);
            }
        })
        .catch(error => {

            console.error(`Error loading ${source.path}:`, error);

            const list = document.getElementById(source.listId);

            const li = document.createElement("li");
            li.textContent =
                `Unable to load files from ${source.path}`;

            list.appendChild(li);
        });
});
</script>
```
