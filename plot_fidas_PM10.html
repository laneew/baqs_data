<script type="module">
import { NetCDFReader } from "https://cdn.jsdelivr.net/npm/netcdfjs/+esm";

async function loadData() {
    try {

        const response = await fetch(
            "fidas/PM/netcdf/BAQS_FIDAS_PM_concentration_201905_Ratified_v2.2.nc"
        );
		
		const text = await response.clone().text();
		console.log(text.substring(0,500));

        console.log("Response status:", response.status);

        const buffer = await response.arrayBuffer();

        window.reader = new NetCDFReader(buffer);

        console.log("Reader:", window.reader);
        console.log("Variables:", window.reader.variables);

    } catch (err) {
        console.error("ERROR:", err);
    }
}

loadData();
</script>
