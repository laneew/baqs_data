<h1>FIDAS Particulate Matter Data (&mu;g/m<sup>3</sup>)</h1>

<ul>
    <li>PM1.0</li>
    <li>PM2.5</li>
    <li>PM10</li>
</ul>

[Flags: 0b - No data; 1b - Good Data; 2b - Bad Data; 3b - Suspect; 4b - Local Influence.]

<h2>CSV Files</h2>
<ul id="csv-file-list"></ul>

<h2>NetCDF Files</h2>
<ul id="netcdf-file-list"></ul>

<script>
const owner = "dcsbeddows";
const repo = "baqs_data";

const sources = [
    {
        path: "fidas/PM/csv",
        extensions: [".csv"],
        listId: "csv-file-list",
        title: "CSV"
    },
    {
        path: "fidas/PM/netcdf",
        extensions: [".nc", ".nc4", ".cdf"],
        listId: "netcdf-file-list",
        title: "NetCDF"
    }
];

sources.forEach(source => {

    fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${source.path}`)
        .then(response => {
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            return response.json();
        })
        .then(files => {

            const list = document.getElementById(source.listId);

            files
                .filter(file =>
                    source.extensions.some(ext =>
                        file.name.toLowerCase().endsWith(ext)
                    )
                )
                .sort((a, b) => a.name.localeCompare(b.name))
                .forEach(file => {

                    const li = document.createElement("li");
                    const a = document.createElement("a");

                    const rawUrl =
                        `https://raw.githubusercontent.com/${owner}/${repo}/main/${source.path}/${file.name}`;

                    a.href = "#";
                    a.textContent = file.name;

                    a.addEventListener("click", async (e) => {
                        e.preventDefault();

                        try {
                            const response = await fetch(rawUrl);

                            if (!response.ok) {
                                throw new Error(`HTTP ${response.status}`);
                            }

                            const blob = await response.blob();
                            const blobUrl = URL.createObjectURL(blob);

                            const downloadLink = document.createElement("a");
                            downloadLink.href = blobUrl;
                            downloadLink.download = file.name;

                            document.body.appendChild(downloadLink);
                            downloadLink.click();
                            document.body.removeChild(downloadLink);

                            URL.revokeObjectURL(blobUrl);

                        } catch (error) {
                            console.error(`Download failed for ${file.name}:`, error);
                            alert(`Unable to download ${file.name}`);
                        }
                    });

                    li.appendChild(a);
                    list.appendChild(li);
                });

            if (list.children.length === 0) {
                const li = document.createElement("li");
                li.textContent = `No ${source.title} files found`;
                list.appendChild(li);
            }
        })
        .catch(error => {

            console.error(`Error loading ${source.path}:`, error);

            const list = document.getElementById(source.listId);

            const li = document.createElement("li");
            li.textContent =
                `Unable to load files from ${source.path}`;

            list.appendChild(li);
        });
});
</script>
