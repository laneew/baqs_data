<h1>LGR MCEA (CO; CO<sub>2</sub>; CH<sub>4</sub>&emsp and H<sub>2</sub>O) (ppm)</h1>

[Flags: 0b - No data; 1b - Good Data; 2b - Bad Data; 3b - Suspect; 4b - Local Influence; 5b - No data OR Bad data.]

<h2>CSV Files</h2>
<ul id="csv-file-list"></ul>

<h2>NetCDF Files</h2>
<ul id="netcdf-file-list"></ul>

<script>
const sources = [
    {         
        path: "lgr_mcea/csv",
        extensions: [".csv"],
        listId: "csv-file-list",
        title: "CSV"
    },
    {
        path: "lgr_mcea/netcdf",
        extensions: [".nc", ".nc4", ".cdf"],
        listId: "netcdf-file-list",
        title: "NetCDF"
    }
];

/*
  IMPORTANT:
  No GitHub API used anymore.
  You maintain file lists manually here.
*/
const fileIndex = {
    "lgr_mcea/csv": [
        // Add CSV filenames here
		"ghg_02-2025-hour.csv",
		"ghg_04-2025-hour.csv",
		"ghg_05-2025-hour.csv",
		"ghg_06-2025-hour.csv"
    ],
    "lgr_mcea/netcdf": [
        // Add NetCDF filenames here
    ]
};

sources.forEach(source => {

    const list = document.getElementById(source.listId);
    const files = fileIndex[source.path] || [];

    const filtered = files
        .filter(file =>
            source.extensions.some(ext =>
                file.toLowerCase().endsWith(ext)
            )
        )
        .sort();

    if (filtered.length === 0) {
        const li = document.createElement("li");
        li.textContent = `No ${source.title} files found`;
        list.appendChild(li);
        return;
    }

    filtered.forEach(file => {

        const li = document.createElement("li");
        const a = document.createElement("a");

        const rawUrl =
            `https://raw.githubusercontent.com/dcsbeddows/baqs_data/main/${source.path}/${file}`;

        a.href = "#";
        a.textContent = file;

        a.addEventListener("click", async (e) => {
            e.preventDefault();

            try {
                const response = await fetch(rawUrl);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);

                const downloadLink = document.createElement("a");
                downloadLink.href = blobUrl;
                downloadLink.download = file;

                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);

                URL.revokeObjectURL(blobUrl);

            } catch (error) {
                console.error(`Download failed for ${file}:`, error);
                alert(`Unable to download ${file}`);
            }
        });

        li.appendChild(a);
        list.appendChild(li);
    });
});
</script>
