<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAQS FIDAS Data Downloads</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            line-height: 1.6;
        }

        h1 {
            color: #333;
        }

        ul {
            list-style-type: none;
            padding-left: 0;
        }

        li {
            margin: 8px 0;
        }

        a {
            text-decoration: none;
            color: #0066cc;
        }

        a:hover {
            text-decoration: underline;
        }

        .loading {
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>

    <h1>BAQS FIDAS Data Downloads</h1>

    <p>
        Monthly FIDAS instrument data files from May 2019 through March 2026.
    </p>

    <p>
        Click a file name below to download the CSV file.
    </p>

    <p class="loading" id="loading">
        Loading file list...
    </p>

    <ul id="file-list"></ul>

    <script>
        const owner = "dcsbeddows";
        const repo = "baqs_data";

        fetch(`https://api.github.com/repos/${owner}/${repo}/contents`)
            .then(response => response.json())
            .then(files => {

                document.getElementById("loading").style.display = "none";

                const list = document.getElementById("file-list");

                files
                    .filter(file => file.name.toLowerCase().endsWith(".csv"))
                    .sort((a, b) => a.name.localeCompare(b.name))
                    .forEach(file => {

                        const li = document.createElement("li");

                        const link = document.createElement("a");

                        link.href = file.download_url;
                        link.textContent = file.name;
                        link.setAttribute("download", file.name);

                        li.appendChild(link);
                        list.appendChild(li);
                    });
            })
            .catch(error => {
                document.getElementById("loading").textContent =
                    "Unable to load file list.";
                console.error(error);
            });
    </script>

</body>
</html>
